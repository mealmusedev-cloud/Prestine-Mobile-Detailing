name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you trigger a deploy manually from the Actions tab
  workflow_dispatch:

# Required permissions for the deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy runs at a time; in-flight deploys are NOT cancelled
# so a push never leaves the site in a half-deployed state
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # Upload the entire repo as the Pages artifact (no build step needed)
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
