<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login — Prestine Mobile Detailing</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-box-logo">Prestine<span>.</span></div>
      <p class="subtitle">Admin Panel</p>
      <h2>Welcome back</h2>

      <!-- Google sign-in (Firebase mode) -->
      <div id="googleSignIn">
        <div id="loginError" class="error-msg"></div>
        <button id="googleBtn" class="btn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:0.6rem">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.7-2.9-11.3-7.1l-6.5 5C9.6 39.7 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.4-2.5 4.4-4.6 5.8l6.2 5.2C40.9 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
          Sign in with Google
        </button>
      </div>

      <!-- Password sign-in (local fallback mode only) -->
      <form id="localSignIn" class="hidden">
        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <div id="localError" class="error-msg"></div>
        <button class="btn" type="submit" style="width:100%;margin-top:0.5rem">Sign In →</button>
      </form>

      <p style="text-align:center;margin-top:1.25rem">
        <a href="index.html" style="color:var(--text-muted);font-size:0.85rem">← Back to site</a>
      </p>
    </div>
  </div>

  <!-- Firebase SDK (compat) — must load before config.js and firebase-init.js -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Already signed in — go straight to admin
    if (Auth.isAuthed()) { window.location.href = "admin.html"; }

    if (window.APP_CONFIG.useLocalFallback) {
      // Local dev mode — show password form, hide Google button
      document.getElementById("googleSignIn").classList.add("hidden");
      document.getElementById("localSignIn").classList.remove("hidden");
    }

    // Google sign-in
    document.getElementById("googleBtn").addEventListener("click", async () => {
      const errEl = document.getElementById("loginError");
      const btn = document.getElementById("googleBtn");
      errEl.textContent = "";
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Signing in…';
      const result = await Auth.login();
      if (result.ok) {
        window.location.href = "admin.html";
      } else {
        errEl.textContent = result.error;
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.7-2.9-11.3-7.1l-6.5 5C9.6 39.7 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.4-2.5 4.4-4.6 5.8l6.2 5.2C40.9 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"/></svg> Sign in with Google`;
      }
    });

    // Local fallback password form
    document.getElementById("localSignIn").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("localError");
      const btn = e.target.querySelector("button[type=submit]");
      errEl.textContent = "";
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Signing in…';
      const result = await Auth.login(null, document.getElementById("password").value);
      if (result.ok) {
        window.location.href = "admin.html";
      } else {
        errEl.textContent = result.error;
        btn.disabled = false;
        btn.textContent = "Sign In →";
      }
    });
  </script>
</body>
</html>
